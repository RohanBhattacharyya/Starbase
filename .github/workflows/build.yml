name: Build Starbase

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-latest
            command: dist:linux
            artifact: starbase-linux-x64
            files: |
              dist/*.AppImage
              dist/*.AppImage.blockmap
          - name: Windows x64
            os: windows-latest
            command: dist:win
            artifact: starbase-windows-x64
            files: |
              dist/*.exe
              dist/*.exe.blockmap
          - name: macOS Universal
            os: macos-latest
            command: dist:mac
            artifact: starbase-macos-universal
            files: |
              dist/*.dmg
              dist/*.dmg.blockmap

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run ${{ matrix.command }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.files }}
          if-no-files-found: error
